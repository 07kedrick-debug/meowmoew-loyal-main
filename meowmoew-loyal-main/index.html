<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchme.nails Virtual Loyalty Card</title>
    <style>
        :root {
            --bg-color: #f2ebe3;
            --card-bg: #f9f5f0;
            --text-main: #332c25;
            --accent-color: #c5a880;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #8a7e72;
        }

        /* Login Container */
        .login-container {
            background-color: var(--card-bg);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            display: none;
        }

        .login-container.active {
            display: block;
        }

        .login-container h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1c7bd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-container button {
            width: 100%;
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .login-container button:hover {
            opacity: 0.9;
        }

        .error-message {
            color: #a84a4a;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .success-message {
            color: #4a8a4a;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #d1c7bd;
            background-color: transparent;
            color: var(--text-main);
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Loyalty Card Container */
        .loyalty-card {
            background-color: var(--card-bg);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            border: 1px solid rgba(0,0,0,0.03);
            display: none;
        }

        .loyalty-card.active {
            display: block;
        }

        /* Decorative Stars */
        .star {
            position: absolute;
            font-size: 14px;
            color: var(--text-main);
        }
        .star-left { top: 40px; left: 40px; }
        .star-right { top: 40px; right: 40px; }

        .sub-title {
            font-style: italic;
            font-family: 'Times New Roman', serif;
            font-size: 18px;
            margin-bottom: 5px;
            color: #554a3f;
        }

        .main-title {
            font-size: 42px;
            font-weight: normal;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .user-email {
            font-size: 14px;
            color: #8a7e72;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Stamps Row */
        .stamps-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .stamp-slot {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 2px dashed #d1c7bd;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* Placeholder Nail Icon */
        .stamp-slot::before {
            content: '💅';
            font-size: 24px;
            opacity: 0.25;
            transition: opacity 0.3s;
        }

        /* Active Stamp State */
        .stamp-slot.active {
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-image: url('image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .stamp-slot.active::before {
            display: none;
        }

        .stamp-slot.active::after {
            display: none;
        }

        .reward-text {
            font-size: 18px;
            margin-bottom: 10px;
            color: #4a4035;
        }

        .footer-note {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8a7e72;
            margin-top: 30px;
            border-top: 1px solid #e3dacfa8;
            padding-top: 20px;
            width: 100%;
        }

        /* User Controls */
        .user-controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .logout-btn {
            background-color: #a84a4a;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        /* Admin Panel */
        .admin-container {
            background-color: var(--card-bg);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-sizing: border-box;
            margin-top: 30px;
            display: none;
        }

        .admin-container.active {
            display: block;
        }

        .admin-container h2 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: normal;
            text-align: center;
        }

        .admin-controls {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e3dacfa8;
        }

        .admin-button {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: opacity 0.2s;
            margin-right: 10px;
        }

        .admin-button:hover {
            opacity: 0.9;
        }

        .admin-button.logout {
            background-color: #a84a4a;
        }

        .users-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            background-color: #ffffff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #e3dacfa8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-item-info {
            flex: 1;
            min-width: 200px;
        }

        .user-item-email {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-item-stamps {
            font-size: 14px;
            color: #8a7e72;
        }

        .user-item-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stamp-btn, .remove-btn, .clear-btn {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        .stamp-btn:hover {
            opacity: 0.9;
        }

        .remove-btn, .clear-btn {
            background-color: #a84a4a;
        }

        .remove-btn:hover, .clear-btn:hover {
            opacity: 0.9;
        }

        .admin-login-container {
            background-color: var(--card-bg);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            display: none;
            margin-top: 30px;
        }

        .admin-login-container.active {
            display: block;
        }

        .admin-login-container h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .admin-login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1c7bd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
        }

        .admin-login-container button {
            width: 100%;
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        .admin-login-container button:hover {
            opacity: 0.9;
        }

        .toggle-admin-btn {
            margin-top: 20px;
            font-size: 12px;
        }

        .toggle-admin-btn button {
            background-color: transparent;
            color: var(--text-main);
            text-decoration: underline;
            padding: 0;
            width: auto;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">Scratchme.nails</div>

    <!-- LOGIN CONTAINER -->
    <div class="login-container" id="loginContainer">
        <h2>Your Loyalty Card</h2>
        
        <!-- Tab Buttons -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('signup')">New Card</button>
            <button class="tab-btn" onclick="switchTab('login')">My Card</button>
        </div>

        <!-- Sign Up Tab -->
        <div class="tab-content active" id="signup-tab">
            <div class="error-message" id="signupError"></div>
            <input type="email" id="emailInput" placeholder="Enter your email" required>
            <button onclick="createAccount()">Create Card</button>
        </div>

        <!-- Login Tab -->
        <div class="tab-content" id="login-tab">
            <div class="error-message" id="loginError"></div>
            <input type="email" id="loginEmailInput" placeholder="Enter your email" required>
            <button onclick="loginUser()">View My Card</button>
        </div>

        <div class="toggle-admin-btn">
            <button onclick="toggleAdminLogin()">Admin Login</button>
        </div>
    </div>

    <!-- ADMIN LOGIN CONTAINER -->
    <div class="admin-login-container" id="adminLoginContainer">
        <h2>Admin Login</h2>
        <div class="error-message" id="adminLoginError"></div>
        <input type="password" id="adminPasswordInput" placeholder="Enter admin password" required>
        <button onclick="adminLogin()">Login as Admin</button>
        <div class="toggle-admin-btn">
            <button onclick="toggleAdminLogin()">Back to User Login</button>
        </div>
    </div>

    <!-- LOYALTY CARD CONTAINER -->
    <div class="loyalty-card" id="loyaltyCard">
        <span class="star star-left">✦</span>
        <span class="star star-right">✦</span>
        
        <div class="sub-title">Scratchme.nails' virtual</div>
        <h1 class="main-title">Loyalty Card</h1>
        <div class="user-email" id="displayEmail"></div>
        
        <div class="stamps-container">
            <div class="stamp-slot" id="slot-1"></div>
            <div class="stamp-slot" id="slot-2"></div>
            <div class="stamp-slot" id="slot-3"></div>
            <div class="stamp-slot" id="slot-4"></div>
        </div>

        <div class="reward-text" id="reward-message">Get 30% off on your 5th visit!</div>
        
        <div class="footer-note">1 Qualifying Visit = 1 MeowMeow</div>

        <div class="user-controls">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-container" id="adminContainer">
        <h2>Admin Dashboard</h2>
        
        <div class="admin-controls">
            <button class="admin-button logout" onclick="logoutAdmin()">Logout</button>
        </div>

        <h3>Registered Customers</h3>
        <div class="users-list" id="usersList"></div>
    </div>

    <script>
        // ADMIN PASSWORD (Change this to your desired password)
        const ADMIN_PASSWORD = "salon123";

        // Initialize
        function init() {
            const currentUser = localStorage.getItem('current_user');
            const isAdmin = localStorage.getItem('is_admin');

            if (isAdmin === 'true') {
                showAdminDashboard();
            } else if (currentUser) {
                showLoyaltyCard();
            } else {
                showLoginContainer();
            }
        }

        function switchTab(tab) {
            // Hide all tabs
            document.getElementById('signup-tab').classList.remove('active');
            document.getElementById('login-tab').classList.remove('active');

            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // Show selected tab
            if (tab === 'signup') {
                document.getElementById('signup-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('signupError').innerText = '';
            } else {
                document.getElementById('login-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('loginError').innerText = '';
            }
        }

        function showLoginContainer() {
            document.getElementById('loginContainer').classList.add('active');
            document.getElementById('loyaltyCard').classList.remove('active');
            document.getElementById('adminContainer').classList.remove('active');
            document.getElementById('adminLoginContainer').classList.remove('active');
        }

        function showAdminLogin() {
            document.getElementById('adminLoginContainer').classList.add('active');
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('loyaltyCard').classList.remove('active');
            document.getElementById('adminContainer').classList.remove('active');
        }

        function toggleAdminLogin() {
            if (document.getElementById('adminLoginContainer').classList.contains('active')) {
                showLoginContainer();
            } else {
                showAdminLogin();
            }
            document.getElementById('adminLoginError').innerText = '';
            document.getElementById('signupError').innerText = '';
            document.getElementById('loginError').innerText = '';
        }

        function showLoyaltyCard() {
            document.getElementById('loyaltyCard').classList.add('active');
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('adminContainer').classList.remove('active');
            document.getElementById('adminLoginContainer').classList.remove('active');
            
            const email = localStorage.getItem('current_user');
            document.getElementById('displayEmail').innerText = email;
            updateCardDisplay();
        }

        function showAdminDashboard() {
            document.getElementById('adminContainer').classList.add('active');
            document.getElementById('loyaltyCard').classList.remove('active');
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('adminLoginContainer').classList.remove('active');
            displayAllUsers();
        }

        function createAccount() {
            const email = document.getElementById('emailInput').value.trim();
            const errorDiv = document.getElementById('signupError');

            if (!email) {
                errorDiv.innerText = 'Please enter an email';
                return;
            }

            if (!email.includes('@gmail.com')) {
                errorDiv.innerText = 'Please use a Gmail address';
                return;
            }

            // Get all users
            let users = JSON.parse(localStorage.getItem('all_users')) || {};

            if (users[email]) {
                errorDiv.innerText = 'This email already has a card! Use "My Card" tab to login.';
                return;
            }

            // Create new user
            users[email] = {
                email: email,
                stamps: 0,
                createdAt: new Date().toLocaleString()
            };

            localStorage.setItem('all_users', JSON.stringify(users));
            localStorage.setItem('current_user', email);
            localStorage.setItem(`stamps_${email}`, '0');

            document.getElementById('emailInput').value = '';
            errorDiv.innerText = '';
            showLoyaltyCard();
        }

        function loginUser() {
            const email = document.getElementById('loginEmailInput').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!email) {
                errorDiv.innerText = 'Please enter an email';
                return;
            }

            if (!email.includes('@gmail.com')) {
                errorDiv.innerText = 'Please use a Gmail address';
                return;
            }

            // Get all users
            let users = JSON.parse(localStorage.getItem('all_users')) || {};

            if (!users[email]) {
                errorDiv.innerText = 'No card found for this email. Create a new card?';
                return;
            }

            // Login successful
            localStorage.setItem('current_user', email);
            document.getElementById('loginEmailInput').value = '';
            errorDiv.innerText = '';
            showLoyaltyCard();
        }

        function logout() {
            localStorage.removeItem('current_user');
            showLoginContainer();
            document.getElementById('emailInput').value = '';
            document.getElementById('loginEmailInput').value = '';
            document.getElementById('signupError').innerText = '';
            document.getElementById('loginError').innerText = '';
        }

        function adminLogin() {
            const password = document.getElementById('adminPasswordInput').value;
            const errorDiv = document.getElementById('adminLoginError');

            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('is_admin', 'true');
                document.getElementById('adminPasswordInput').value = '';
                errorDiv.innerText = '';
                showAdminDashboard();
            } else {
                errorDiv.innerText = 'Incorrect password';
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('is_admin');
            showLoginContainer();
            document.getElementById('adminPasswordInput').value = '';
            document.getElementById('adminLoginError').innerText = '';
        }

        function displayAllUsers() {
            const users = JSON.parse(localStorage.getItem('all_users')) || {};
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';

            if (Object.keys(users).length === 0) {
                usersList.innerHTML = '<p>No customers yet</p>';
                return;
            }

            Object.keys(users).forEach(email => {
                const user = users[email];
                const stamps = parseInt(localStorage.getItem(`stamps_${email}`)) || 0;

                const userItem = document.createElement('div');
                userItem.className = 'user-item';
                userItem.innerHTML = `
                    <div class="user-item-info">
                        <div class="user-item-email">${email}</div>
                        <div class="user-item-stamps">Stamps: ${stamps}/4 | Joined: ${user.createdAt}</div>
                    </div>
                    <div class="user-item-buttons">
                        <button class="stamp-btn" onclick="adminAddStamp('${email}')">+ Add Stamp</button>
                        <button class="clear-btn" onclick="adminClearStamps('${email}')">Clear Stamps</button>
                        <button class="remove-btn" onclick="removeUser('${email}')">Remove</button>
                    </div>
                `;
                usersList.appendChild(userItem);
            });
        }

        function adminAddStamp(email) {
            let users = JSON.parse(localStorage.getItem('all_users')) || {};
            let stamps = parseInt(localStorage.getItem(`stamps_${email}`)) || 0;

            if (stamps < 4) {
                stamps++;
                localStorage.setItem(`stamps_${email}`, stamps.toString());
                displayAllUsers();
            } else {
                alert('Card is already full!');
            }
        }

        function adminClearStamps(email) {
            if (confirm(`Clear all stamps for ${email}?`)) {
                localStorage.setItem(`stamps_${email}`, '0');
                displayAllUsers();
            }
        }

        function removeUser(email) {
            if (confirm(`Are you sure you want to remove ${email}'s card?`)) {
                let users = JSON.parse(localStorage.getItem('all_users')) || {};
                delete users[email];
                localStorage.setItem('all_users', JSON.stringify(users));
                localStorage.removeItem(`stamps_${email}`);
                displayAllUsers();
            }
        }

        function updateCardDisplay() {
            const email = localStorage.getItem('current_user');
            const stamps = parseInt(localStorage.getItem(`stamps_${email}`)) || 0;

            for (let i = 1; i <= 4; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (i <= stamps) {
                    slot.classList.add('active');
                } else {
                    slot.classList.remove('active');
                }
            }

            const message = document.getElementById('reward-message');
            if (stamps >= 4) {
                message.innerHTML = "<strong>🎉 Meow! You've unlocked 30% off your next visit!</strong>";
            } else {
                message.innerText = "Get 30% off on your 5th visit!";
            }
        }

        // Initialize on page load
        init();
    </script>

</body>
</html>
